<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#faf8f5" />
    <title>Game Night</title>
    <link href="games.css" rel="stylesheet" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="options-panel">
        <h1>Board Game Collection</h1>
        <ul id="games-list" class="games-grid"></ul>
      </div>
      <div class="randomizer-panel">
        <div class="result-section">
          <p id="result-header">You should play:</p>
          <a id="result-link" href="#" target="_blank" rel="noopener">
            <img id="result-thumb" alt="" />
            <p id="result-text"></p>
            <p id="result-meta"></p>
          </a>
        </div>
        <div class="button-group">
          <button id="randomize">Randomize</button>
        </div>
        <div id="filter-options">
          <div class="filter-group">
            <label class="filter-group-label" for="player-count">Players</label>
            <input
              type="number"
              id="player-count"
              min="1"
              max="8"
              value="4"
            />
          </div>
          <div class="filter-group">
            <label class="filter-group-label" for="max-time"
              >Max time: <span id="max-time-display">no limit</span></label
            >
            <input
              type="range"
              id="max-time"
              min="0"
              max="180"
              step="15"
              value="0"
            />
          </div>
        </div>
      </div>
    </div>
    <script src="games.js"></script>
  </body>
</html>
